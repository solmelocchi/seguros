spring.application.name=seguros

# === Conexion a MySQL ===
spring.datasource.url=jdbc:mysql://localhost:3306/seguros_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# === JPA / Hibernate ===
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# === Thymeleaf ===
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# === Puerto ===
server.port=8081

# === Email Gmail ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=solmelocchi582@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# === Scheduling ===
spring.task.scheduling.pool.size=5